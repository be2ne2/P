name: Port Scanner
on: [workflow_dispatch]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check port 1080
        run: |
          # فایل خروجی رو خالی کن
          > ips.txt
          
          # هر خط از r.txt رو بخون و تست کن
          while read ip; do
            # اگه خط خالی بود رد کن
            [ -z "$ip" ] && continue
            
            # پورت 1080 رو چک کن
            if timeout 2 bash -c "cat < /dev/null > /dev/tcp/$ip/1080" 2>/dev/null; then
              echo "$ip:1080" >> ips.txt
              echo "✅ $ip:1080 باز"
            else
              echo "❌ $ip:1080 بسته"
            fi
          done < r.txt
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: ips.txt
